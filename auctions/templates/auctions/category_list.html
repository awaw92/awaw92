{% extends "auctions/layout.html" %}

{% block content %}
    <h2>Kategorie</h2>
    <ul>
        {% for category_data in categories %}
            <li>
                <a href="{% url 'auctions:category_detail' category_data.category.id %}">
                    {{ category_data.category.name }} ({{ category_data.listing_count }} ogłoszeń)
                </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
